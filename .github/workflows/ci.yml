name: CI

on:
  push:
    branches: [main, develop, 'claude/**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Pin npm version
        run: npm i -g npm@10

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root --foreground-scripts

      - name: Cache Prisma engines
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/prisma
            node_modules/.prisma
            apps/api/node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('apps/api/prisma/schema.prisma', 'apps/api/package.json', 'package-lock.json') }}
          restore-keys: |
            prisma-${{ runner.os }}-

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Build shared package
        run: npm run build --workspace=@kost/shared

      - name: Generate Prisma client
        run: npm run generate --workspace=@kost/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Push schema to test DB
        run: npm run db:push --workspace=@kost/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Test API (unit)
        run: npm run test --workspace=@kost/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret

      - name: Test API (e2e)
        run: npm run test:e2e --workspace=@kost/api
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: test-secret

      - name: Build API
        run: npm run build --workspace=@kost/api

      - name: Typecheck Web
        run: npm run typecheck --workspace=@kost/web

      - name: Build Web
        run: npm run build --workspace=@kost/web
        env:
          VITE_API_URL: http://localhost:3000/api

      - name: Upload npm logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-logs
          path: ~/.npm/_logs/*.log
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build single-container app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: kost-app:latest
          build-args: |
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max
