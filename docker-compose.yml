services:
  db:
    image: postgres:16-alpine
    container_name: kost-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-kostuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kostpass}
      POSTGRES_DB: ${DB_NAME:-kost}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kostuser} -d ${DB_NAME:-kost}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kost

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Single-container mode must call same-origin API path to avoid stale external host configs
        VITE_API_URL: /api
    container_name: kost-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${DB_USER:-kostuser}:${DB_PASSWORD:-kostpass}@db:5432/${DB_NAME:-kost}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      APP_URL: ${APP_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      CORS_ALLOW_PRIVATE_NETWORK: ${CORS_ALLOW_PRIVATE_NETWORK:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-10}
      BOOTSTRAP_ADMIN_ON_STARTUP: ${BOOTSTRAP_ADMIN_ON_STARTUP:-true}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-kostpass}
      BOOTSTRAP_ADMIN_NAME: ${BOOTSTRAP_ADMIN_NAME:-Admin}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - uploads_data:/app/apps/api/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    networks:
      - kost

networks:
  kost:
    driver: bridge

volumes:
  postgres_data:
  uploads_data:
