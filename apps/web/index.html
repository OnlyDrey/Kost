<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Shared expense tracking application" />
    <meta name="theme-color" content="#0B1020" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kost" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      try {
        const s = localStorage.getItem('settings');
        const theme = s ? JSON.parse(s).theme : null;
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    </script>

    <script>
    (function () {
      function show(msg) {
        try {
          var el = document.getElementById('kost-crash');
          if (!el) {
            el = document.createElement('pre');
            el.id = 'kost-crash';
            el.style.cssText =
              'position:fixed;inset:0;z-index:99999;overflow:auto;background:#0b1020;color:#fff;padding:16px;white-space:pre-wrap;font:12px/1.4 monospace;';
            document.body.appendChild(el);
          }
          el.textContent = msg;
        } catch (_) {}
      }

      window.addEventListener('error', function (e) {
        show(
          '[window.error]\n' +
            (e && e.message ? e.message : String(e)) +
            '\n' +
            (e && e.error && e.error.stack ? e.error.stack : '')
        );
      });

      window.addEventListener('unhandledrejection', function (e) {
        var r = e && e.reason;
        show(
          '[unhandledrejection]\n' +
            (r && r.message ? r.message : String(r)) +
            '\n' +
            (r && r.stack ? r.stack : '')
        );
      });
    })();
    </script>


    <script>
    (function () {
      function ensureBanner() {
        var el = document.getElementById('kost-diag');
        if (!el) {
          el = document.createElement('pre');
          el.id = 'kost-diag';
          el.style.cssText =
            'position:fixed;top:8px;left:8px;z-index:99998;background:rgba(11,16,32,.9);color:#9ef;padding:8px 10px;margin:0;white-space:pre-wrap;font:12px/1.4 monospace;border:1px solid #2a335c;border-radius:6px;max-width:calc(100vw - 16px);';
          document.body.appendChild(el);
        }
        return el;
      }

      function getRootStatus() {
        var root = document.getElementById('root');
        if (!root) {
          return 'missing';
        }
        return root.childNodes && root.childNodes.length > 0 ? 'mounted' : 'empty';
      }

      function getModuleStatus() {
        return window.__KOST_MODULE_LOADED__ ? 'loaded' : 'pending';
      }

      function render(extraRootMessage) {
        var lines = [
          'Kost diagnostics active',
          'location: ' + window.location.pathname,
          'module: ' + getModuleStatus(),
          'root: ' + (extraRootMessage || getRootStatus()),
        ];
        ensureBanner().textContent = lines.join('\n');
      }

      document.addEventListener('DOMContentLoaded', function () {
        render();

        [1000, 3000, 5000].forEach(function (delay) {
          setTimeout(function () {
            var rootStatus = getRootStatus();
            if (delay === 5000 && rootStatus === 'empty') {
              render('still empty after 5s');
              return;
            }
            render(rootStatus);
          }, delay);
        });
      });
    })();
    </script>

    <title>Kost</title>
  </head>
  <body>
    <div id="root"></div>
    <script id="kost-module" type="module" src="/src/main.tsx" onload="window.__KOST_MODULE_LOADED__=true"></script>
  </body>
</html>
